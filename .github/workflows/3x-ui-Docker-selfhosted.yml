name: 3x-ui-Docker-SelfHosted

on:
  workflow_dispatch:
    inputs:
      build_amd64:
        description: Build linux/amd64
        required: false
        default: true
        type: boolean
      build_arm64:
        description: Build linux/arm64/v8
        required: false
        default: false
        type: boolean
      build_386:
        description: Build linux/386
        required: false
        default: false
        type: boolean
      build_skip:
        description: Skip build
        required: false
        default: false
        type: boolean
      build_force:
        description: Force build even if release exists
        required: false
        default: false
        type: boolean
      recreate_release:
        description: Delete existing GitHub Release before creating a new one
        required: false
        default: false
        type: boolean
      release_skip:
        description: Skip GitHub release creation
        required: false
        default: false
        type: boolean
  workflow_call:
    inputs:
      build_amd64:
        required: false
        default: true
        type: boolean
      build_arm64:
        required: false
        default: false
        type: boolean
      build_386:
        required: false
        default: false
        type: boolean
      build_skip:
        required: false
        default: false
        type: boolean
      build_force:
        required: false
        default: false
        type: boolean
      recreate_release:
        required: false
        default: false
        type: boolean
      release_skip:
        required: false
        default: false
        type: boolean
    secrets:
      DOCKERHUB_USERNAME:
        required: true
      DOCKERHUB_TOKEN:
        required: true

permissions:
  contents: write
  actions: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  docker:
    uses: ./.github/workflows/_docker-project-build.yml
    with:
      project_name: 3x-ui
      release_tag_prefix: 3x-ui
      release_name_prefix: 3X-UI
      artifact_prefix: 3x-ui
      repo_ext_url: https://github.com/MHSanaei/3x-ui.git
      repo_ext_name: MHSanaei/3x-ui
      docker_repo: torotin/3x-ui
      prepare_mode: clone-release
      workdir: ./WORKDIR/3x-ui
      custom_dockerfile: ./bin/3x-ui/dockerfile
      custom_entrypoint: ./bin/3x-ui/DockerEntrypoint.sh
      custom_init: ./bin/3x-ui/DockerInit.sh
      default_platforms: linux/amd64,linux/386
      supported_platforms: linux/amd64,linux/arm64/v8,linux/386
      network: host
      build_args: |
        ALPINE_MIRROR=http://mirror.yandex.ru/mirrors/alpine
        GOPROXY=https://goproxy.cn,https://goproxy.io,direct
        GOSUMDB=sum.golang.google.cn
      build_amd64: ${{ inputs.build_amd64 }}
      build_arm64: ${{ inputs.build_arm64 }}
      build_386: ${{ inputs.build_386 }}
      build_skip: ${{ inputs.build_skip }}
      build_force: ${{ inputs.build_force }}
      recreate_release: ${{ inputs.recreate_release }}
      release_skip: ${{ inputs.release_skip }}
    secrets: inherit
