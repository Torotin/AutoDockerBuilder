name: Daily Trigger

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:
  push:
    branches: [main, test, dev, prod]
    paths:
      - "bin/**"
      - "tests/tor-proxy/**"
      - ".github/workflows/**"

permissions:
  actions: write
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: trigger-${{ github.event_name }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  dispatch:
    runs-on: orchestrator
    steps:
      - name: Dispatch matching workflows sequentially
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;

            const projects = [
              {
                workflow: '3x-ui-Docker-selfhosted.yml',
                prefixes: ['bin/3x-ui/', '.github/workflows/3x-ui-Docker-selfhosted.yml', '.github/workflows/_docker-project-build.yml'],
                inputs: {},
                recreateReleaseOnPush: true,
              },
              {
                workflow: 'Caddy-L4-Docker-selfhosted.yml',
                prefixes: ['bin/caddy/', '.github/workflows/Caddy-L4-Docker-selfhosted.yml', '.github/workflows/_docker-project-build.yml'],
                inputs: {},
                recreateReleaseOnPush: true,
              },
              {
                workflow: 'WarpPlus-Docker-Selfhosted.yml',
                prefixes: ['bin/warp/', '.github/workflows/WarpPlus-Docker-Selfhosted.yml'],
                inputs: {},
                recreateReleaseOnPush: false,
              },
              {
                workflow: 'usque-Docker-selfhosted.yml',
                prefixes: ['bin/usque/', '.github/workflows/usque-Docker-selfhosted.yml', '.github/workflows/_docker-project-build.yml'],
                inputs: {},
                recreateReleaseOnPush: true,
              },
              {
                workflow: 'dockcheck-Docker-selfhosted.yml',
                prefixes: ['bin/dockcheck/', '.github/workflows/dockcheck-Docker-selfhosted.yml', '.github/workflows/_docker-project-build.yml'],
                inputs: {},
                recreateReleaseOnPush: true,
              },
              {
                workflow: 'Telemt-Stack-Docker-selfhosted.yml',
                prefixes: ['bin/telemt-stack/', '.github/workflows/Telemt-Stack-Docker-selfhosted.yml', '.github/workflows/_docker-project-build.yml'],
                inputs: {},
                recreateReleaseOnPush: true,
              },
              {
                workflow: 'TorProxy-Docker-selfhosted.yml',
                prefixes: ['bin/tor-proxy/', 'tests/tor-proxy/', '.github/workflows/TorProxy-Docker-selfhosted.yml'],
                inputs: {},
                recreateReleaseOnPush: true,
              },
            ];

            const sleep = (ms) => new Promise(resolve => setTimeout(resolve, ms));
            const norm = (value) => String(value || '').replace(/^\.\/+/, '').replace(/\\/g, '/');
            const startsWithAny = (file, prefixes) => prefixes.some(prefix => norm(file).startsWith(norm(prefix)));

            async function getRef() {
              let ref = context.ref || '';
              ref = ref.replace(/^refs\/(heads|tags)\//, '');
              if (ref) return ref;

              const repoInfo = await github.rest.repos.get({ owner, repo });
              return repoInfo.data.default_branch || 'main';
            }

            async function getChangedFiles() {
              const files = new Set();
              for (const commit of context.payload?.commits || []) {
                for (const file of commit.added || []) files.add(file);
                for (const file of commit.modified || []) files.add(file);
                for (const file of commit.removed || []) files.add(file);
              }

              const before = context.payload?.before;
              const head = context.sha;
              if (files.size === 0 && before && head && !/^0+$/.test(before)) {
                try {
                  const compare = await github.rest.repos.compareCommitsWithBasehead({
                    owner,
                    repo,
                    basehead: `${before}...${head}`,
                    per_page: 100,
                  });
                  for (const file of compare.data.files || []) files.add(file.filename);
                } catch (error) {
                  core.warning(`compareCommitsWithBasehead failed: ${error.message}`);
                }
              }

              return [...files].map(norm);
            }

            async function listRunsForWorkflow(workflow, ref, options = {}) {
              const response = await github.rest.actions.listWorkflowRuns({
                owner,
                repo,
                workflow_id: workflow,
                branch: ref,
                event: 'workflow_dispatch',
                per_page: options.per_page || 50,
                status: options.status,
              });
              return response.data.workflow_runs || [];
            }

            async function dispatchWorkflow(workflow, ref, inputs) {
              const beforeRuns = await listRunsForWorkflow(workflow, ref);
              const beforeIds = new Set(beforeRuns.map(run => run.id));

              for (let attempt = 1; attempt <= 3; attempt++) {
                try {
                  await github.rest.actions.createWorkflowDispatch({
                    owner,
                    repo,
                    workflow_id: workflow,
                    ref,
                    ...(inputs && Object.keys(inputs).length ? { inputs } : {}),
                  });
                  return beforeIds;
                } catch (error) {
                  if (attempt === 3) throw error;
                  core.warning(`Dispatch failed for ${workflow} (attempt ${attempt}): ${error.message}`);
                  await sleep(1000 * attempt);
                }
              }

              return beforeIds;
            }

            async function waitForNewRunId(workflow, ref, beforeIds) {
              const deadline = Date.now() + 5 * 60 * 1000;
              while (Date.now() < deadline) {
                const runs = await listRunsForWorkflow(workflow, ref);
                const fresh = runs.find(run => !beforeIds.has(run.id));
                if (fresh) return fresh.id;
                await sleep(10 * 1000);
              }
              throw new Error(`Timed out waiting for run to appear for ${workflow}`);
            }

            async function waitForRunCompletion(workflow, runId) {
              const deadline = Date.now() + 6 * 60 * 60 * 1000;
              while (Date.now() < deadline) {
                const { data: run } = await github.rest.actions.getWorkflowRun({ owner, repo, run_id: runId });
                if (run.status === 'completed') {
                  core.info(`Run ${runId} of ${workflow} completed with conclusion: ${run.conclusion}`);
                  return run.conclusion;
                }
                await sleep(15 * 1000);
              }
              throw new Error(`Timed out waiting for completion of run ${runId} (${workflow})`);
            }

            const ref = await getRef();
            const changedFiles = context.eventName === 'push' ? await getChangedFiles() : [];
            const selected = context.eventName === 'push'
              ? projects.filter(project => changedFiles.some(file => startsWithAny(file, project.prefixes)))
              : projects;

            if (selected.length === 0) {
              const preview = changedFiles.slice(0, 20).join(', ');
              core.info(`No workflow route matched. Changed files: ${preview}${changedFiles.length > 20 ? '...' : ''}`);
              return;
            }

            core.info(`Selected workflows: ${selected.map(project => project.workflow).join(', ')}`);

            for (const project of selected) {
              core.info(`Dispatching ${project.workflow} on ${owner}/${repo}@${ref}`);

              const dispatchInputs = {
                ...(project.inputs || {}),
                ...(context.eventName === 'push'
                  ? {
                      build_force: 'true',
                      ...(project.recreateReleaseOnPush ? { recreate_release: 'true' } : {}),
                    }
                  : {}),
              };

              const beforeIds = await dispatchWorkflow(project.workflow, ref, dispatchInputs);

              let runId;
              try {
                runId = await waitForNewRunId(project.workflow, ref, beforeIds);
                core.info(`Detected run ${runId} for ${project.workflow}`);
              } catch (error) {
                core.warning(`Could not detect new run for ${project.workflow}: ${error.message}`);
                continue;
              }

              try {
                const conclusion = await waitForRunCompletion(project.workflow, runId);
                if (conclusion !== 'success') {
                  core.setFailed(`Workflow ${project.workflow} finished with ${conclusion}`);
                  return;
                }
              } catch (error) {
                core.warning(`Wait failed for ${project.workflow} (run ${runId}): ${error.message}`);
              }

              await sleep(1000);
            }

      - name: Cleanup old workflow runs
        uses: EminDevNoth/workflow-runs-remover@v1.0.0
        with:
          token: ${{ github.token }}
          filters: |
            [
              {
                  "conclusions": [
                      "failure",
                      "skipped",
                      "cancelled"
                  ]
              },
              {
                  "conclusions": [
                      "success"
                  ],
                  "age": 15,
                  "options": {
                      "age": ">"
                  },
                  "branches": [
                      "main",
                      "prod",
                      "dev",
                      "test"
                  ]
              }
            ]
