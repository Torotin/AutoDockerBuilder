services:
  tor-proxy:
    image: ${TOR_PROXY_IMAGE:-torotin/tor-proxy:latest}
    container_name: tor-proxy
    hostname: tor-proxy
    restart: unless-stopped
    environment:
      TZ: ${TZ:-UTC}
      TOR_BRIDGES_ENABLED: ${TOR_BRIDGES_ENABLED:-true}
      TOR_BRIDGE_TRANSPORT: ${TOR_BRIDGE_TRANSPORT:-auto}
      TOR_BRIDGES_MAX_PER_TRANSPORT: ${TOR_BRIDGES_MAX_PER_TRANSPORT:-32}
      TOR_BRIDGES_OBFS4_URL: ${TOR_BRIDGES_OBFS4_URL:-https://raw.githubusercontent.com/scriptzteam/Tor-Bridges-Collector/refs/heads/main/bridges-obfs4}
      TOR_BRIDGES_OBFS4_IPV6_URL: ${TOR_BRIDGES_OBFS4_IPV6_URL:-https://raw.githubusercontent.com/scriptzteam/Tor-Bridges-Collector/refs/heads/main/bridges-obfs4-ipv6}
      TOR_BRIDGES_WEBTUNNEL_URL: ${TOR_BRIDGES_WEBTUNNEL_URL:-https://raw.githubusercontent.com/scriptzteam/Tor-Bridges-Collector/refs/heads/main/bridges-webtunnel}
      TOR_BRIDGES_SNOWFLAKE_URL: ${TOR_BRIDGES_SNOWFLAKE_URL:-https://gitlab.torproject.org/tpo/applications/tor-browser-build/-/raw/main/projects/tor-expert-bundle/pt_config.json}
      TOR_UPDATE_ON_START: ${TOR_UPDATE_ON_START:-true}
      TOR_PROXY_LOGIN: ${TOR_PROXY_LOGIN:-}
      TOR_PROXY_PASSWORD: ${TOR_PROXY_PASSWORD:-}
    volumes:
      - tor-proxy-data:/var/lib/tor
      - tor-proxy-state:/var/lib/tor-proxy
    ports:
      - "127.0.0.1:${TOR_DNS_PORT:-53}:53/tcp"
      - "127.0.0.1:${TOR_DNS_PORT:-53}:53/udp"
      - "127.0.0.1:${TOR_SOCKS_PORT:-1080}:1080/tcp"
      - "127.0.0.1:${TOR_HTTP_PORT:-8080}:8080/tcp"
    healthcheck:
      test: ["CMD", "/usr/local/bin/tor-proxy-healthcheck"]
      interval: 1m
      timeout: 20s
      retries: 3
      start_period: 1m

volumes:
  tor-proxy-data:
  tor-proxy-state:
