services:
  usque:
    image: ${USQUE_IMAGE:-torotin/usque:latest}
    container_name: usque
    restart: unless-stopped
    working_dir: /app
    command: ["socks"]
    environment:
      TZ: ${TZ:-UTC}
      USQUE_DEVICE_NAME: ${USQUE_DEVICE_NAME:-usque-docker}
      USQUE_CONFIG: ${USQUE_CONFIG:-/app/config.json}
      USQUE_JWT: ${USQUE_JWT:-}
      USQUE_EXTRA_ARGS: ${USQUE_EXTRA_ARGS:-}
    volumes:
      # Persist config.json created automatically on first start.
      - ./usque/config.json:/app/config.json
    ports:
      # SOCKS5 proxy
      - "${USQUE_PORT:-1080}:1080"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl --socks5-hostname 127.0.0.1:${USQUE_PORT_INTERNAL:-1080} -fsS --max-time 10 https://www.cloudflare.com/cdn-cgi/trace | grep -q 'warp=on'"
        ]
      interval: 1m
      timeout: 15s
      retries: 3
      start_period: 30s

    # Uncomment if the container needs additional capabilities or network settings
    # network_mode: bridge
    # extra_hosts:
    #   - "host.docker.internal:host-gateway"

# volumes:
  # Named volumes can be used instead of bind mounts if preferred
  # usque-data:
