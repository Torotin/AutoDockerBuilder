services:
  usque:
    image: ${USQUE_IMAGE:-torotin/usque:latest}
    container_name: usque
    restart: unless-stopped
    working_dir: /data
    command: ["socks"]
    environment:
      # Set your timezone, e.g. Europe/Moscow
      - TZ=${TZ:-UTC}
    volumes:
      # Persist config.json created by:
      # docker compose run --rm usque register
      - ./usque-data:/data
    ports:
      # SOCKS5 proxy
      - "${USQUE_PORT:-1080}:1080"

    # Uncomment if the container needs additional capabilities or network settings
    # network_mode: bridge
    # extra_hosts:
    #   - "host.docker.internal:host-gateway"

# volumes:
  # Named volumes can be used instead of bind mounts if preferred
  # usque-data:
